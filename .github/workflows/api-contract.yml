name: API Contract

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run live API contract check
        env:
          GRIDLE_API_KEY: ${{ secrets.GRIDLE_API_KEY }}
        run: python scripts/check_api_contract.py
