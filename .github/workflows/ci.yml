name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check version sync
        run: python scripts/check_version_sync.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy custom_components/elisa_kotiakku

      - name: Pytest
        run: pytest --cov=custom_components/elisa_kotiakku --cov-fail-under=95 -q
