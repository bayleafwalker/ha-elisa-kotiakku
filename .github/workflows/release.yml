name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check version sync
        run: python scripts/check_version_sync.py --tag "${GITHUB_REF_NAME}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --generate-notes \
            --title "${GITHUB_REF_NAME}" \
            --verify-tag
          echo "::notice::Release created. Edit the notes at https://github.com/${{ github.repository }}/releases/tag/${GITHUB_REF_NAME} to match .github/release-notes-template.md"
