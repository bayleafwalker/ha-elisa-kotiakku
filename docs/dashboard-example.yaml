title: Kotiakku
path: kotiakku
icon: mdi:home-battery
cards:
  - type: gauge
    name: Battery SoC
    entity: sensor.elisa_kotiakku_battery_state_of_charge
    min: 0
    max: 100
    severity:
      green: 40
      yellow: 20
      red: 0

  - type: entities
    title: Current power and price
    entities:
      - entity: sensor.elisa_kotiakku_battery_power
      - entity: sensor.elisa_kotiakku_solar_power
      - entity: sensor.elisa_kotiakku_grid_power
      - entity: sensor.elisa_kotiakku_house_power
      - entity: sensor.elisa_kotiakku_spot_price
      - entity: sensor.elisa_kotiakku_active_import_unit_price
      - entity: sensor.elisa_kotiakku_active_export_unit_price

  - type: entities
    title: Economics
    entities:
      - entity: sensor.elisa_kotiakku_total_net_site_electricity_cost
      - entity: sensor.elisa_kotiakku_total_battery_savings
      - entity: sensor.elisa_kotiakku_total_electricity_tax_cost
      - entity: sensor.elisa_kotiakku_total_solar_used_in_house_value
      - entity: sensor.elisa_kotiakku_total_solar_export_net_value
      - entity: sensor.elisa_kotiakku_total_battery_house_supply_value
      - entity: sensor.elisa_kotiakku_total_avoided_grid_import_energy
      - entity: sensor.elisa_kotiakku_current_month_power_peak
      - entity: sensor.elisa_kotiakku_current_month_power_fee_estimate

  - type: markdown
    content: >
      `Total battery house supply value` is a gross avoided-import value.
      It is not the same as `Total battery savings`, which still reflects the
      wider no-battery baseline including export and power-fee effects.

  - type: history-graph
    title: Power trend (24h)
    hours_to_show: 24
    entities:
      - entity: sensor.elisa_kotiakku_battery_power
      - entity: sensor.elisa_kotiakku_solar_power
      - entity: sensor.elisa_kotiakku_grid_power
      - entity: sensor.elisa_kotiakku_house_power

  - type: statistics-graph
    title: Cumulative energy (7d)
    chart_type: line
    period: day
    days_to_show: 7
    stat_types:
      - change
    entities:
      - entity: sensor.elisa_kotiakku_grid_import_energy
      - entity: sensor.elisa_kotiakku_grid_export_energy
      - entity: sensor.elisa_kotiakku_solar_production_energy

  - type: markdown
    content: >
      Enable disabled-by-default diagnostics from Settings -> Devices & Services ->
      Entities -> Elisa Kotiakku.

  - type: entities
    title: Battery health and autonomy
    entities:
      - entity: sensor.elisa_kotiakku_estimated_battery_health
      - entity: sensor.elisa_kotiakku_estimated_usable_battery_capacity
      - entity: sensor.elisa_kotiakku_battery_equivalent_full_cycles
      - entity: sensor.elisa_kotiakku_self_sufficiency_ratio_30d
      - entity: sensor.elisa_kotiakku_solar_self_consumption_ratio_30d
      - entity: sensor.elisa_kotiakku_battery_house_supply_ratio_30d
      - entity: sensor.elisa_kotiakku_estimated_backup_runtime_hours

  - type: entities
    title: Maintenance
    show_header_toggle: false
    entities:
      - entity: button.elisa_kotiakku_backfill_energy
      - entity: button.elisa_kotiakku_rebuild_economics
      - entity: button.elisa_kotiakku_force_data_refresh

  - type: entities
    title: Diagnostics
    show_header_toggle: false
    entities:
      - entity: sensor.elisa_kotiakku_configured_tariff_preset
      - entity: sensor.elisa_kotiakku_active_tariff_mode
      - entity: sensor.elisa_kotiakku_active_tariff_period
      - entity: sensor.elisa_kotiakku_configured_power_fee_rule
      - entity: sensor.elisa_kotiakku_active_electricity_tax_fee
      - entity: sensor.elisa_kotiakku_skipped_savings_windows
